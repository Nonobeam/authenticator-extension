<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Authenticator</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Local Authenticator</h1>
        <div class="header-actions">
          <button id="theme-toggle-btn" class="theme-switch" type="button" role="switch" aria-checked="false" aria-label="Toggle dark mode">
            <span class="theme-switch-track" aria-hidden="true">
              <span class="theme-switch-thumb"></span>
            </span>
          </button>
          <button id="add-account-btn" class="btn btn-primary" type="button">Add Key</button>
        </div>
      </header>

      <p id="message" class="message hidden" role="status" aria-live="polite"></p>

      <section id="accounts-container" class="accounts" aria-live="polite"></section>
    </main>

    <dialog id="add-method-dialog" class="account-dialog add-method-dialog">
      <div class="add-method-body">
        <h2>Add key</h2>
        <p class="add-method-help">Choose how you want to add a key.</p>
        <div class="add-method-actions">
          <button id="add-new-btn" class="btn btn-primary" type="button">Add new</button>
          <button id="add-uri-btn" class="btn" type="button">Add with URI</button>
        </div>
        <div class="dialog-actions">
          <button id="add-method-cancel-btn" class="btn" type="button">Cancel</button>
        </div>
      </div>
    </dialog>

    <dialog id="account-dialog" class="account-dialog">
      <form id="account-form" class="account-form" method="dialog" novalidate>
        <h2 id="dialog-title">Add key</h2>

        <input type="hidden" id="account-id" name="id" />

        <label for="account-label">Name</label>
        <input id="account-label" name="label" type="text" maxlength="80" required />

        <label for="account-secret">Secret (Base32)</label>
        <input id="account-secret" name="secret" type="text" autocomplete="off" spellcheck="false" required />

        <label for="account-type">Type</label>
        <select id="account-type" name="type">
          <option value="totp">Time-based (TOTP)</option>
          <option value="hotp">Counter-based (HOTP)</option>
        </select>

        <label for="account-digits">Digits</label>
        <select id="account-digits" name="digits">
          <option value="6">6</option>
          <option value="8">8</option>
        </select>

        <div id="totp-field-group" class="hidden">
          <input id="account-period" name="period" type="hidden" value="30" />
        </div>

        <div id="hotp-field-group" class="hidden">
          <label for="account-counter">Counter</label>
          <input id="account-counter" name="counter" type="number" min="0" step="1" value="0" />
        </div>

        <p id="form-error" class="error hidden" role="alert"></p>

        <div class="dialog-actions">
          <button id="cancel-btn" class="btn" type="button">Cancel</button>
          <button class="btn btn-primary" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="uri-dialog" class="account-dialog">
      <form id="uri-form" class="account-form" method="dialog" novalidate>
        <h2>Add key with URI</h2>

        <label for="uri-input">otpauth URI</label>
        <textarea id="uri-input" name="uri" rows="3" placeholder="otpauth://totp/..." spellcheck="false" required></textarea>

        <p id="uri-form-error" class="error hidden" role="alert"></p>

        <div class="dialog-actions">
          <button id="uri-cancel-btn" class="btn" type="button">Cancel</button>
          <button class="btn btn-primary" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
